schema: ae.definition.v1
version: 1
name: Agentic Executables (AE)
description: Libraries/packages managed by AI agents as executable programs for installation, configuration, usage, and uninstallation.
contexts:
  library:
    description: Maintain AE files within the library itself
    use_case: For library maintainers creating AE documentation
  project:
    description: Use AE in projects that depend on the library
    use_case: For developers integrating libraries as AE
actions:
  - name: bootstrap
    description: Create/maintain AE files in a library
    applicable_contexts:
      - library
  - name: install
    description: Add AE to a project
    applicable_contexts:
      - library
      - project
tools:
  - name: ae_definition
    description: Retrieve core AE definition and framework overview
    use_case: Understand what AE is and which contexts/actions are available
core_principles:
  - name: Agent Empowerment
    description: Equip AI agents with meta-rules to autonomously maintain AEs.
