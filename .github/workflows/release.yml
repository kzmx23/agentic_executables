name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-14
            target: darwin-arm64
          - runner: macos-13
            target: darwin-x64
          - runner: ubuntu-22.04
            target: linux-x64
    runs-on: ${{ matrix.runner }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Dart
        uses: dart-lang/setup-dart@v1

      - name: Install dependencies
        run: |
          cd agentic_executables_cli
          dart pub get

      - name: Build release artifact
        env:
          AE_TARGET_TRIPLE: ${{ matrix.target }}
        run: scripts/build_release_artifacts.sh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ae-${{ matrix.target }}
          path: |
            dist/*/ae_${{ matrix.target }}.tar.gz
            dist/*/ae_${{ matrix.target }}.tar.gz.sha256

  publish:
    needs: build
    runs-on: ubuntu-22.04

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Publish GitHub Release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release-artifacts/**/ae_*.tar.gz
            release-artifacts/**/ae_*.tar.gz.sha256
